<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamWorks | Custom Lighting</title>
    <meta name="description" content="Premium minimalist lighting for modern interiors.">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="env.js"></script>
    <script src="supabase-config.js"></script>
    <script src="shared.js"></script>
</head>
<body>



    <!-- HERO BANNER -->
    <header class="hero" id="hero-section" style="margin-top: 60px;">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h2></h2>
            <a class="btn" id="hero-cta-btn" href="promotions.html"></a>
        </div>
    </header>

    <!-- FEATURED PRODUCTS -->
    <section class="container">
        <h3 class="section-title">Featured Pieces</h3>
        <div id="featured-grid" class="grid product-grid"></div>
    </section>

    <script>
        window.onload = async function() {
            await sharedInit();
            injectFooter();
            renderFeatured();
            await loadHeroFromDB();
        };

        function renderFeatured() {
            const container = document.getElementById('featured-grid');
            // Show all products (not just featured=true) — hide only sold_out from shop grid
            const visible = PRODUCTS_DB.filter(p => p.status !== 'sold_out');
            container.innerHTML = visible.length
                ? visible.map(p => createProductCard(p)).join('')
                : '<p style="color:var(--text-muted); font-size:13px;">No products yet.</p>';
        }
    </script>
</body>
</html>
