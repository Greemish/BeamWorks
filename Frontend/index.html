<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamWorks | Custom Lighting</title>
    <meta name="description" content="Premium minimalist lighting for modern interiors.">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="env.js"></script>
    <script src="supabase-config.js"></script>
    <script src="shared.js"></script>
</head>
<body>

    <nav style="position: fixed; width: 100%; top: 0; z-index: 1000; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 0;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer; height: 40px; display: flex; align-items: center;"><img src="./logo/logo.jpeg" alt="BeamWorks Logo" style="height: 40px; width: auto;"></div>
            <div style="display: flex; gap: 30px; align-items: center;">
                <button onclick="window.location.href='index.html'" style="background: none; border: none; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; color: #f0f0f0; transition: all 0.4s;">Home</button>
                <button onclick="window.location.href='shop.html'" style="background: none; border: none; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; color: #f0f0f0; transition: all 0.4s;">Collection</button>
                <span style="position:relative; margin-left:40px; cursor:pointer;" onclick="toggleCart()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 6h15l-1.5 9h-13z" stroke="#f0f0f0" stroke-width="2" fill="none"/>
                        <circle cx="9" cy="21" r="1.5" fill="#D4AF37"/>
                        <circle cx="18" cy="21" r="1.5" fill="#D4AF37"/>
                    </svg>
                    <span id="cart-count" style="position:absolute; top:-8px; right:-8px; background:var(--accent); color:white; border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center; font-size:11px;">0</span>
                </span>
            </div>
        </div>
    </nav>

    <!-- HERO BANNER -->
    <header class="hero" id="hero-section" style="margin-top: 60px;">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h2></h2>
            <a class="btn" id="hero-cta-btn" href="promotions.html"></a>
        </div>
    </header>

    <!-- FEATURED PRODUCTS -->
    <section class="container">
        <h3 class="section-title">Featured Pieces</h3>
        <div id="featured-grid" class="grid product-grid"></div>
    </section>

    <script>
        window.onload = async function() {
            await sharedInit();
            injectFooter();
            renderFeatured();
            await loadHeroFromDB();
        };

        function renderFeatured() {
            const container = document.getElementById('featured-grid');
            const featured = PRODUCTS_DB.filter(p => p.status !== 'sold_out');
            container.innerHTML = featured.map(p => createProductCard(p)).join('');
        }
    </script>
</body>
</html>
