<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection | BeamWorks</title>
    <meta name="description" content="Browse our full collection of premium minimalist lighting.">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="env.js"></script>
    <script src="supabase-config.js"></script>
    <script src="shared.js"></script>
</head>
<body>

    <nav style="position: fixed; width: 100%; top: 0; z-index: 1000; background: rgba(249, 247, 242, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.08); padding: 12px 0;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer; height: 40px; display: flex; align-items: center;"><img src="./logo/logo.jpeg" alt="BeamWorks Logo" style="height: 40px; width: auto;"></div>
            <div style="display: flex; gap: 30px;">
                <button onclick="window.location.href='index.html'" style="background: none; border: none; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; color: #2C2C2C; transition: all 0.4s;">Home</button>
                <button onclick="window.location.href='shop.html'" style="background: none; border: none; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; color: #2C2C2C; transition: all 0.4s;">Collection</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="shop-layout" style="padding-top: 140px;">
            <aside>
                <h4 class="filter-title">Categories</h4>
                <ul class="filter-list" id="shop-categories-list"></ul>
            </aside>
            <section id="full-grid" class="grid product-grid"></section>
        </div>
    </div>

    <script>
        let activeCategory = null;

        window.onload = async function() {
            await sharedInit();
            injectFooter();
            renderShop();
        };

        function renderShop() {
            const container = document.getElementById('full-grid');
            container.innerHTML = PRODUCTS_DB.map(p => createProductCard(p)).join('');
            renderCategorySidebar();
        }

        function renderCategorySidebar() {
            // Pull distinct categories from loaded products, sorted alphabetically
            const categories = [...new Set(PRODUCTS_DB.map(p => p.category).filter(Boolean))].sort();
            const catList = document.getElementById('shop-categories-list');
            catList.innerHTML =
                `<li class="${activeCategory === null ? 'active' : ''}" onclick="filterShop(null)">All</li>` +
                categories.map(c =>
                    `<li class="${activeCategory === c ? 'active' : ''}" onclick="filterShop('${c}')">${c}</li>`
                ).join('');
        }

        function filterShop(category) {
            activeCategory = category;
            const container = document.getElementById('full-grid');
            const filtered = category ? PRODUCTS_DB.filter(p => p.category === category) : PRODUCTS_DB;
            container.innerHTML = filtered.map(p => createProductCard(p)).join('');
            renderCategorySidebar();
        }
    </script>
</body>
</html>
